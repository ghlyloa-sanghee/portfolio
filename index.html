<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 첫 페이지</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="logo">OVERCOME</div>
        <nav>
          <a href="#">홈</a>
          <a href="#">소개</a>
          <a href="#">작업물</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="hero">
        <h1>안녕하세요,</h1>
        <p>만나서 반갑습니다.</p>
      </section>
      <section class="cards">
        <div class="card">
          <h3>디자인</h3>
          <p>Figma로 UI/UX 설계하기</p>
        </div>
        <div class="card">
          <h3>퍼블리싱</h3>
          <p>HTML/CSS로 구현하기</p>
        </div>
        <div class="card">
          <h3>개발</h3>
          <p>JavaScript로 동작 만들기</p>
        </div>
      </section>
      <section class="works">
        <h2>works</h2>
        <div class="works-grid">
          <div class="work-item">
            <div class="work-thumb"></div>
            <h3>프로젝트 1</h3>
            <p>UI/UX 디자인</p>
          </div>
          <div class="work-item">
            <div class="work-thumb"></div>
            <h3>프로젝트 2</h3>
            <p>웹 퍼블리싱</p>
          </div>
          <div class="work-item">
            <div class="work-thumb"></div>
            <h3>프로젝트 3</h3>
            <p>랜딩페이지</p>
          </div>
          <div class="work-item">
            <div class="work-thumb"></div>
            <h3>프로젝트 4</h3>
            <p>디자인 시스템</p>
          </div>
        </div>
      </section>
    </main>
    <footer><p>© 2026 이상희</p></footer>

</html>
